<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SCAMEASTER</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script type="module" src="auth.js"></script>
    <style>
        body { font-family: 'Noto Sans', sans-serif; }
        :root { --ib: #0058A3; --ibd: #004F93; --iy: #FBD914; --ibk: #111111; --igl: #F5F5F5; }
        .bg-ib { background-color: var(--ib); }
        .bg-iy { background-color: var(--iy); }
        .c-ib { color: var(--ib); }
    </style>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen flex flex-col">
        <div class="bg-ib py-4 px-6">
            <div class="max-w-7xl mx-auto flex items-center justify-between">
                <a href="index.html" class="flex items-center">
                    <div class="bg-iy rounded-lg px-4 py-1">
                        <span class="text-xl font-black c-ib tracking-tight">SCAMEASTER</span>
                    </div>
                </a>
                <a href="index.html" class="text-white text-sm font-medium hover:text-yellow-300 transition-colors">← Back to home</a>
            </div>
        </div>
        <div class="flex-1 flex items-center justify-center p-4 py-12">
            <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden border border-gray-100" id="loginForm">
                <div class="bg-ib p-8 text-center">
                    <h1 class="text-2xl font-black text-white mb-2">Welcome back!</h1>
                    <p class="text-blue-200 text-sm">Log in to your SCAMEASTER account</p>
                </div>
                <div class="p-8">
                    <form onsubmit="login(event); return false;">
                        <div class="mb-5">
                            <label for="loginEmail" class="block text-sm font-bold text-gray-800 mb-2">Email</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                                    </svg>
                                </div>
                                <input type="text" id="loginEmail" name="username" required
                                    class="w-full pl-10 pr-4 py-3 border-2 border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-sm"
                                    placeholder="Enter your email">
                            </div>
                        </div>

                        <div class="mb-5">
                            <label for="loginPassword" class="block text-sm font-bold text-gray-800 mb-2">Password</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                                    </svg>
                                </div>
                                <input type="password" id="loginPassword" name="password" required
                                    class="w-full pl-10 pr-4 py-3 border-2 border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-sm"
                                    placeholder="Enter your password">
                            </div>
                        </div>

                        <div class="flex items-center justify-between mb-6">
                            <div class="flex items-center">
                                <input type="checkbox" id="remember" name="remember"
                                    class="h-4 w-4 rounded border-gray-300 cursor-pointer" style="accent-color: var(--ib);">
                                <label for="remember" class="ml-2 text-sm text-gray-600 cursor-pointer">Remember me</label>
                            </div>
                            <a href="resetpassword.html" class="text-sm font-semibold hover:underline" style="color: var(--ib);">Forgot password?</a>
                        </div>

                        <button type="submit"
                            class="w-full text-white py-3 px-4 rounded-full font-bold text-sm hover:opacity-90 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-all active:scale-[0.98]"
                            style="background-color: var(--ib);">
                            Log in
                        </button>

                        <p id="message" class="text-red-500 text-sm mt-3 text-center"></p>

                        <div class="mt-4 text-center">
                            <a href="Admin Stuff/admin.html" class="text-sm text-gray-500 hover:text-gray-700 font-medium transition-colors">
                                Login as Admin →
                            </a>
                        </div>
                    </form>
                    <div class="relative my-6">
                        <div class="absolute inset-0 flex items-center">
                            <div class="w-full border-t border-gray-200"></div>
                        </div>
                        <div class="relative flex justify-center text-sm">
                            <span class="px-4 bg-white text-gray-400">or</span>
                        </div>
                    </div>
                    <div class="text-center">
                        <p class="text-gray-600 text-sm">
                            Don't have an account?
                            <a href="signup.html" class="font-bold hover:underline" style="color: var(--ib);">Create one</a>
                        </p>
                    </div>
                    <div class="mt-6 p-4 rounded-xl border-2 border-dashed" style="border-color: var(--iy); background-color: #FFFDF0;">
                        <div class="flex items-center space-x-3">
                            <span class="text-2xl">🏷️</span>
                            <div>
                                <p class="font-bold text-sm text-gray-800">Join SCAMEASTER Family</p>
                                <p class="text-xs text-gray-500">Get exclusive offers and 20% off your first order</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="auth.js"></script>
</body>
</html>
