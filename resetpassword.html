<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - SCAMEASTER</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans', sans-serif; }
        :root { --ib: #0058A3; --ibd: #004F93; --iy: #FBD914; --ibk: #111111; --igl: #F5F5F5; }
        .bg-ib { background-color: var(--ib); }
        .bg-iy { background-color: var(--iy); }
        .c-ib { color: var(--ib); }
    </style>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen flex flex-col">
        <div class="bg-ib py-4 px-6">
            <div class="max-w-7xl mx-auto flex items-center justify-between">
                <a href="index.html" class="flex items-center">
                    <div class="bg-iy rounded-lg px-4 py-1">
                        <span class="text-xl font-black c-ib tracking-tight">SCAMEASTER</span>
                    </div>
                </a>
                <a href="login.html" class="text-white text-sm font-medium hover:text-yellow-300 transition-colors">&larr; Back to login</a>
            </div>
        </div>
        <div class="flex-1 flex items-center justify-center p-4 py-12">
            <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden border border-gray-100">
                <div class="bg-ib p-8 text-center">
                    <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-white/10 mb-4">
                        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path>
                        </svg>
                    </div>
                    <h1 class="text-2xl font-black text-white mb-2">Reset your password</h1>
                    <p class="text-blue-200 text-sm">Enter your email and we'll send you a reset link</p>
                </div>
                <div class="p-8">
                    <form id="resetForm">
                        <div class="mb-6">
                            <label for="resetEmail" class="block text-sm font-bold text-gray-800 mb-2">Email Address</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                                    </svg>
                                </div>
                                <input type="email" id="resetEmail" name="email" required
                                    class="w-full pl-10 pr-4 py-3 border-2 border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-sm"
                                    placeholder="Enter your registered email">
                            </div>
                        </div>

                        <button type="submit"
                            class="w-full text-white py-3 px-4 rounded-full font-bold text-sm hover:opacity-90 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-all active:scale-[0.98]"
                            style="background-color: var(--ib);">
                            Send reset link
                        </button>

                        <p id="resetMessage" class="text-sm mt-3 text-center hidden"></p>
                    </form>
                    <div class="mt-6 p-4 rounded-xl bg-gray-50 border border-gray-100">
                        <div class="flex items-start space-x-3">
                            <svg class="w-5 h-5 text-gray-400 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                            <div>
                                <p class="text-xs text-gray-500">Check your inbox and spam folder for the reset email. The link will expire in 24 hours.</p>
                            </div>
                        </div>
                    </div>
                    <div class="mt-6 text-center">
                        <p class="text-gray-600 text-sm">
                            Remember your password?
                            <a href="login.html" class="font-bold hover:underline" style="color: var(--ib);">Log in</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
